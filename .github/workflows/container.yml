name: container

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: api
            context: apps/api
          - name: web
            context: apps/web
    steps:
      - uses: actions/fleet@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.target.context }}
          push: true
          tags: |
            ghcr.io/jungle-303-04/bot-service-02-${{ matrix.target.name }}:latest
            ghcr.io/jungle-303-04/bot-service-02-${{ matrix.target.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target.name }}

