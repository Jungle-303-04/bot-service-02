apiVersion: v1
kind: Service
metadata:
  name: bot-service-02-api
  namespace: sandbox
  labels:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-service-02-api
  namespace: sandbox
  labels:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bot-service-02
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bot-service-02
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: bot-service-02-api
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: api
          image: ghcr.io/jungle-303-04/bot-service-02-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: bot-service-02
            - name: SERVICE_TITLE
              value: Fleet Swarm
            - name: SERVICE_KIND
              value: fleet
            - name: APP_VERSION
              value: v1.0.0-stable
            - name: APP_FLAVOR
              value: stable
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bot-service-02-db-secret
                  key: database-url
            - name: SCENARIO_MAX_ROWS
              value: "12000"
            - name: KUBE_NAMESPACE
              value: sandbox
            - name: BASE_REPLICAS
              value: "1"
            - name: HPA_MAX_REPLICAS
              value: "10"
            - name: SURGE_REPLICAS
              value: "6"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 8
            periodSeconds: 8
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 12
            periodSeconds: 20
          resources:
            requests:
              cpu: 120m
              memory: 180Mi
            limits:
              cpu: 700m
              memory: 512Mi
