apiVersion: v1
kind: Service
metadata:
  name: bot-service-02-db
  namespace: sandbox
  labels:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-service-02-db
  namespace: sandbox
  labels:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bot-service-02
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bot-service-02
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: bot_service_02
            - name: POSTGRES_USER
              value: bot
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bot-service-02-db-secret
                  key: password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bot", "-d", "bot_service_02"]
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "bot", "-d", "bot_service_02"]
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi

