apiVersion: v1
kind: Service
metadata:
  name: bot-service-02-web
  namespace: sandbox
  labels:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: web
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-service-02-web
  namespace: sandbox
  labels:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: bot-service-02
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bot-service-02
        app.kubernetes.io/component: web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/jungle-303-04/bot-service-02-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 8
            periodSeconds: 8
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 12
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 160Mi
