apiVersion: v1
kind: ServiceAccount
metadata:
  name: bot-service-02-api
  namespace: sandbox
  labels:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bot-service-02-api-observer
  namespace: sandbox
  labels:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: api
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bot-service-02-api-observer
  namespace: sandbox
  labels:
    app.kubernetes.io/name: bot-service-02
    app.kubernetes.io/component: api
subjects:
  - kind: ServiceAccount
    name: bot-service-02-api
    namespace: sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bot-service-02-api-observer
